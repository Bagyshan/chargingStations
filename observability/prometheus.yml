# ============================================================================
# Prometheus — обсервабилити-VM
# ----------------------------------------------------------------------------
# Основной поток метрик приходит НЕ через scrape, а через remote-write:
# прод-agent скрейпит /actuator/prometheus локально и шлёт метрики в gateway
# Collector, а тот делает remote-write сюда (нужен флаг
# --web.enable-remote-write-receiver, он выставлен в docker-compose).
#
# Здесь оставляем только self-scrape самого стека наблюдаемости.
# ============================================================================
global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    monitor: charging-stations

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8888']

  - job_name: tempo
    static_configs:
      - targets: ['tempo:3200']
