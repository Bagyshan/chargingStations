# Провайдер дашбордов: Grafana подхватывает JSON из /var/lib/grafana/dashboards
# (смонтирован из observability/grafana/dashboards в docker-compose.observability.yaml).
apiVersion: 1

providers:
  - name: charging-stations
    orgId: 1
    folder: Charging Stations
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
