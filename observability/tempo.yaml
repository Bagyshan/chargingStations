# ============================================================================
# Grafana Tempo — trace-store (обсервабилити-VM)
# ----------------------------------------------------------------------------
# Монолитный режим (single-binary), локальное хранилище на диске.
# Принимает трейсы только по OTLP от gateway Collector'а (внутри сети).
# Retention 7 дней — совпадает с окном логов; при росте объёма уменьшить.
# ============================================================================
stream_over_http_enabled: true

server:
  http_listen_port: 3200
  grpc_listen_port: 9096

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 168h   # 7 дней

metrics_generator:
  registry:
    external_labels:
      source: tempo
  storage:
    path: /var/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true
  traces_storage:
    path: /var/tempo/generator/traces

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics]   # service graph + RED-метрики из трейсов
