# SpringDoc OpenAPI Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
    try-it-out-enabled: true
  packages-to-scan: charg.ing.stations.websocketservice.controller

logging:
  level:
    # Наш сервис - максимальная детализация
    charg.ing.stations.websocketservice: DEBUG
    # Redis операции
    org.springframework.data.redis: DEBUG
    io.lettuce.core: INFO
    # WebSocket
    org.springframework.web.socket: DEBUG
    org.springframework.web.reactive.socket: DEBUG
    # WebFlux
    org.springframework.web.reactive: DEBUG
    # SpringDoc
    org.springdoc: DEBUG
    # Полезные для отладки
    reactor.netty: DEBUG
    reactor.core.publisher.Hooks: DEBUG
    org.springframework.boot.autoconfigure: INFO
