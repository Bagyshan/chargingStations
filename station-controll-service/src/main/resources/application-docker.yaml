spring:
  config:
    activate:
      on-profile: docker

  datasource:
    # внутри docker-compose сервис базы -- station-controller-db
#    url: jdbc:postgresql://station-controller-db:5432/stationdb
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://station-controller-db:5432/stationdb}
    username: ${SPRING_DATASOURCE_USERNAME:station}
    password: ${SPRING_DATASOURCE_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 60000
      initialization-fail-timeout: 0

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAPSERVERS:kafka:9092}
    consumer:
      group-id: station-controller-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false
        spring.json.value.default.type: java.util.Map
        max.block.ms: 5000
        request.timeout.ms: 5000
        delivery.timeout.ms: 10000
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
        enable.idempotence: true
        acks: all
        max.in.flight.requests.per.connection: 1
        retries: 2147483647
        delivery.timeout.ms: 120000
        transactional.id: station-state-producer
    properties:
      security.protocol: PLAINTEXT