spring:
  config:
    activate:
      on-profile: consul

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8080/realms/charging-stations/protocol/openid-connect/certs

  datasource:
    # внутри docker-compose сервис базы -- station-controller-db
    #    url: jdbc:postgresql://station-controller-db:5432/stationdb
    url: jdbc:postgresql://localhost:5432/stationdb
    username: station
    password: changeme
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 60000
      initialization-fail-timeout: 0

#  r2dbc:
#    url: r2dbc:postgresql://localhost:5432/stationdb
#    username: station
#    password: changeme
#    pool:
#      initial-size: 5
#      max-size: 20

  kafka:
    bootstrap-servers: localhost:29092
    consumer:
      group-id: station-controller-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false
        spring.json.value.default.type: java.util.Map
        max.block.ms: 5000
        request.timeout.ms: 5000
        delivery.timeout.ms: 10000
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
        enable.idempotence: true
        acks: all
        max.in.flight.requests.per.connection: 1
        retries: 2147483647
        delivery.timeout.ms: 120000
        transactional.id: station-state-producer
    properties:
      security.protocol: PLAINTEXT

  cloud:
    consul:
      config:
        enabled: false
      discovery:
        host: localhost
        port: 8500
        enabled: true
        register: true
        health-check-path: /actuator/health
        health-check-interval: 15s
        instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
        tags:
          - ev-charging
          - station-management
        health-check-critical-timeout: 5m
        service-name: ${spring.application.name}