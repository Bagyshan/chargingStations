server:
  port: 8001

spring:
  application:
    name: station-controll-service

  jpa:
    hibernate:
      ddl-auto: none   # Liquibase управляет схемой
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect


  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true
    parameters:
      retryAttempts: 10
      retryDelay: 5s

  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 5MB
  codec:
    max-in-memory-size: 5MB

logging:
  level:
    root: INFO
    charg.ing.stations: WARN
#    org.springframework.kafka: DEBUG
    org.apache.kafka: WARN
    org.springframework.web: DEBUG
    charg.ing.stations.service: DEBUG

management:
  server:
    port: ${server.port}
  endpoints:
    web:
      exposure:
        include: "health,info,metrics,prometheus,beans"
      base-path: /actuator

upload:
  path: ./station-controll-service/src/main/resources/static/uploads

# QR-наклейки станций: payload, который сканирует мобильное приложение.
# Итоговая строка: {base}?station={chargeBoxId}&connector={connectorId}
qr:
  payload-base: batenergy://charge
