server:
  port: 8006

spring:
  application:
    name: notification-service

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_USERNAME:bagishan01@gmail.com}
    password: ${EMAIL_PASSWORD:mviuxihupjsaaawq}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            trust: smtp.gmail.com

  kafka:
    bootstrap-servers: localhost:29092
    consumer:
      group-id: notification-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false
      auto-offset-reset: earliest
      max-poll-records: 50
    listener:
      type: batch  # или single, но batch удобнее для производительности
      concurrency: 3  # количество параллельных потоков обработки

# Топики
kafka:
  topics:
    notification-events: notification.events

# FCM push-уведомления. Без файла ключа сервис работает (пуши выключены, WARN в логе).
# Файл — service-account JSON из Firebase Console (Project settings → Service accounts).
fcm:
  service-account-file: ${FCM_SERVICE_ACCOUNT_FILE:/etc/batenergy/firebase-service-account.json}

# Внутренний API user-service (FCM-токены устройств).
services:
  user:
    base-url: ${USER_SERVICE_URL:http://localhost:8005}
internal:
  api-token: ${INTERNAL_API_TOKEN:charging-internal-2026}

# Настройки приложения
app:
  base-url: http://localhost:8005  # базовый URL для ссылок подтверждения
  verification:
    email:
      from: ${EMAIL_USERNAME:bagishan01@gmail.com}

logging:
  level:
    charg.ing.stations: DEBUG
    org.apache.kafka: WARN