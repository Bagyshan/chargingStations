spring:
  config:
    activate:
      on-profile: consul

  application:
    name: user-service

#  jpa:
#    hibernate:
#      ddl-auto: none

  datasource:
    url: jdbc:postgresql://localhost:5433/userdb
    username: user
    password: changeme
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 60000
      initialization-fail-timeout: 0

  r2dbc:
    url: r2dbc:postgresql://localhost:5433/userdb
    username: user
    password: changeme
    pool:
      initial-size: 5
      max-size: 20

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml
    url: jdbc:postgresql://localhost:5433/userdb
    user: user
    password: changeme

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/charging-stations
          jwk-set-uri: http://localhost:8080/realms/charging-stations/protocol/openid-connect/certs

  kafka:
    bootstrap-servers: localhost:29092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.type.mapping: userEvent:com.charging.userservice.event.UserEvent
    consumer:
      group-id: user-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.type.mapping: userEvent:com.charging.userservice.event.UserEvent
        spring.json.trusted.packages: "*"

  mail:
    host: smtp.yandex.ru
    port: 587
    username: ${EMAIL_USERNAME:flagman-inc@yandex.ru}
    password: ${EMAIL_PASSWORD:garzkehjpethfhye}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          ssl:
            trust: smtp.yandex.ru

  cloud:
    consul:
      host: localhost
      port: 8500
      discovery:
        enabled: true
        prefer-ip-address: true
        instance-id: ${spring.application.name}:${random.uuid}



keycloak:
  auth-server-url: http://localhost:8080
  realm: charging-stations
  resource: user-service
  credentials:
    secret: ${KEYCLOAK_CLIENT_SECRET:lk6oom9CCmAsItuL9P5uSKI7vd0HuIBa}
  admin:
    username: ${KEYCLOAK_ADMIN_USERNAME:admin}
    password: ${KEYCLOAK_ADMIN_PASSWORD:changeme}
    client-id: admin-cli

app:
  base-url: localhost:8005

password:
  reset:
    token-expiration-hours: 1

jwt:
  access-token:
    expiration: 900 # 15 минут
  refresh-token:
    expiration: 604800 # 7 дней

verification:
  token:
    expiration: 86400 # 24 часа
  email:
    enabled: true
    from: ${EMAIL_USERNAME:flagman-inc@yandex.ru}

kafka:
  topics:
    user-events: user.events
    notification-events: notification.events

server:
  port: 8005
  forward-headers-strategy: framework

management:
  health:
    mail:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
#  metrics:
#    export:
#      prometheus:
#        enabled: true

logging:
  level:
    charg.ing.stations: DEBUG
    org.springframework.security: INFO
    org.keycloak: INFO
    org.springframework.kafka: INFO
