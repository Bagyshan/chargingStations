# Reverse proxy: единая точка входа на :80.
#   ПУБЛИЧНО:  /realms,/resources,/js (Keycloak OIDC), /steve/websocket + /steve/services (OCPP станций),
#              /uploads, /console (SPA), / (api-gateway: REST всех сервисов + WebSocket /websocket/**)
#   ПОД BASIC AUTH (/etc/nginx/.htpasswd):  /ui + /v1 (Consul), /kafka (Kafka-UI)
#              — у них НЕТ своей авторизации, поэтому nginx-гейт обязателен.
#   Keycloak /admin и SteVe /steve/ (manager) — БЕЗ Basic Auth: у них своя строгая авторизация
#              (Keycloak master-login; SteVe form-login с $STEVE_AUTH_PASSWORD). Basic Auth поверх их
#              Bearer/AJAX-авторизации зацикливает 401 → петля. Для defense-in-depth — IP-allowlist
#              (allow <CIDR>; deny all;) в их location'ах, а НЕ Basic Auth.
#
# Файл .htpasswd монтируется томом (см. docker-compose.prod.yaml) и НЕ коммитится (.gitignore).
# Создать до первого запуска, напр.:
#   docker run --rm httpd:2.4-alpine htpasswd -nbB opsadmin '<надёжный-пароль>' > nginx/.htpasswd

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    # Встроенный DNS Docker. Резолвим имена контейнеров на КАЖДЫЙ запрос (valid=10s),
    # иначе nginx кэширует IP при старте и после рестарта контейнера (новый IP) ловит 502.
    # Поэтому upstream-имена заданы через переменные, а не статическими upstream-блоками.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Аплоады станций и т.п. могут быть крупными
    client_max_body_size 25m;

    # ---- Keycloak OIDC (ПУБЛИЧНО): токены/логин/статика/JS. Issuer = http://<host>/realms/charging-stations ----
    location ~ ^/(realms|resources|js|robots\.txt) {
        set $up_keycloak keycloak:8080;
        proxy_pass http://$up_keycloak;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;
    }

    # ---- Keycloak admin-консоль ----
    # БЕЗ Basic Auth: консоль — SPA, шлёт `Authorization: Bearer` на /admin/realms/** → nginx-Basic видит
    # не-Basic заголовок и зацикливает 401 (бесконечное окно логина). Консоль и так требует master-login
    # Keycloak (сильный KEYCLOAK_ADMIN_PASSWORD). /realms остаётся публичным (OIDC-флоу).
    # Defense-in-depth: раскомментируйте allow/deny со своим IP (office/VPN).
    location ^~ /admin {
        # allow 203.0.113.10;   # <- ваш office/VPN IP
        # deny  all;
        set $up_keycloak keycloak:8080;
        proxy_pass http://$up_keycloak;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;
    }

    # ---- SteVe: OCPP-эндпоинты станций (ПУБЛИЧНО — зарядки подключаются из поля с произвольных IP) ----
    # OCPP-J WebSocket: ws://<host>/steve/websocket/CentralSystemService/<chargeBoxId>
    location /steve/websocket/ {
        set $up_steve app:8180;
        proxy_pass http://$up_steve;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }
    # OCPP-SOAP (легаси-станции)
    location /steve/services/ {
        set $up_steve app:8180;
        proxy_pass http://$up_steve;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # ---- SteVe manager-админка: remote start/stop, конфиг, прошивки станций ----
    # БЕЗ Basic Auth: manager дёргает свой /api по Basic и использует form-login — nginx-Basic поверх
    # зацикливает 401. Защищён собственным form-login SteVe (пароль = $STEVE_AUTH_PASSWORD, усилён).
    # Defense-in-depth: раскомментируйте allow/deny со своим IP.
    location /steve/ {
        # allow 203.0.113.10;   # <- ваш office/VPN IP
        # deny  all;
        set $up_steve app:8180;
        proxy_pass http://$up_steve;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Consul UI + API (ОГРАНИЧЕНО Basic Auth). ----
    # Внутренние сервисы ходят в consul-server:8500 по docker-сети, МИНУЯ nginx — их basic auth не касается.
    location /ui/ {
        auth_basic           "Restricted — ops";
        auth_basic_user_file /etc/nginx/.htpasswd;
        set $up_consul consul-server:8500;
        proxy_pass http://$up_consul;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /v1/ {
        auth_basic           "Restricted — ops";
        auth_basic_user_file /etc/nginx/.htpasswd;
        set $up_consul consul-server:8500;
        proxy_pass http://$up_consul;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Kafka-UI (ОГРАНИЧЕНО Basic Auth) — контекст-путь /kafka ----
    location /kafka/ {
        auth_basic           "Restricted — ops";
        auth_basic_user_file /etc/nginx/.htpasswd;
        set $up_kafkaui kafka-ui:8080;
        proxy_pass http://$up_kafkaui;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Загруженные файлы станций (иконки коннекторов и т.п.) — ПУБЛИЧНО ----
    # Статику отдаёт напрямую station-controll-service (ResourceHandler /uploads/**), минуя api-gateway.
    location /uploads/ {
        set $up_station_controll station-controll-service:8001;
        proxy_pass http://$up_station_controll;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Админ-панель BatEnergy (React SPA) — статика прямо из nginx на /console/ ----
    location = /console { return 301 /console/; }   # без слэша → на канонический путь
    location /console/ {
        root /usr/share/nginx/html;            # файлы: /usr/share/nginx/html/console/**
        index index.html;
        try_files $uri $uri/ /console/index.html;   # SPA-fallback для клиентских маршрутов

        # Хэшированные ассеты Vite иммутабельны → кэшируем надолго.
        location ~* ^/console/assets/.+\.(?:js|css|woff2?|ttf|otf|svg|png|jpe?g|gif|webp|ico)$ {
            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off;
        }

        # index.html не кэшируем, чтобы новый деплой подхватывался сразу.
        location = /console/index.html {
            add_header Cache-Control "no-cache";
        }
    }

    # ---- Всё остальное: API + WebSocket через api-gateway ----
    location / {
        set $up_gateway api-gateway-service:8010;
        proxy_pass http://$up_gateway;
        proxy_http_version 1.1;

        # WebSocket upgrade (ws://<host>/websocket/ws/station-events?token=...)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Долгоживущие WS-соединения
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }
}

# ============================================================================
# HTTPS (Task 6 — включить, когда появится домен + сертификат).
# 1) В docker-compose.prod.yaml раскомментировать порт 443 и монтирование ./nginx/certs.
# 2) Положить fullchain.pem / privkey.pem в ./nginx/certs (или выпустить через certbot).
# 3) Скопировать server-блок выше, заменить `listen 80;` на `listen 443 ssl;` + ssl_certificate(_key),
#    и добавить редирект с 80 на 443. Все location-блоки идентичны.
# ============================================================================
