# Reverse proxy: единая точка входа на :80. Всё (API, WebSocket, админки) — через пути, без отдельных портов.
#   /realms,/resources,/admin,/js -> Keycloak (+ админка /admin/)
#   /steve/                       -> SteVe (OCPP менеджер + OCPP WebSocket)
#   /ui/, /v1/                    -> Consul UI/API
#   /kafka/                       -> Kafka-UI
#   /                             -> api-gateway-service:8010 (REST всех сервисов + WebSocket /websocket/**)

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream api_gateway      { server api-gateway-service:8010; }
upstream keycloak_upstream { server keycloak:8080; }
upstream steve_upstream    { server app:8180; }
upstream consul_upstream   { server consul-server:8500; }
upstream kafkaui_upstream  { server kafka-ui:8080; }

server {
    listen 80;
    server_name _;

    # Аплоады станций и т.п. могут быть крупными
    client_max_body_size 25m;

    # ---- Keycloak (OIDC + админка). Issuer = http://<host>/realms/charging-stations ----
    location ~ ^/(realms|resources|admin|js|robots\.txt) {
        proxy_pass http://keycloak_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;
    }

    # ---- SteVe: админка /steve/manager + OCPP WebSocket /steve/websocket/... ----
    location /steve/ {
        proxy_pass http://steve_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # ---- Consul UI + API ----
    location /ui/ {
        proxy_pass http://consul_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /v1/ {
        proxy_pass http://consul_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Kafka-UI (контекст-путь /kafka задан через SERVER_SERVLET_CONTEXT_PATH) ----
    location /kafka/ {
        proxy_pass http://kafkaui_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Всё остальное: API + WebSocket через api-gateway ----
    location / {
        proxy_pass http://api_gateway;
        proxy_http_version 1.1;

        # WebSocket upgrade (ws://<host>/websocket/ws/station-events?token=...)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Долгоживущие WS-соединения
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }
}

# ============================================================================
# HTTPS (включить, когда появится домен + сертификат).
# 1) В docker-compose.prod.yaml раскомментировать порт 443 и монтирование ./nginx/certs.
# 2) Положить fullchain.pem / privkey.pem в ./nginx/certs (или выпустить через certbot).
# 3) Скопировать server-блок выше, заменить `listen 80;` на `listen 443 ssl;` + ssl_certificate(_key),
#    и при желании добавить редирект с 80 на 443. Все location-блоки идентичны.
# ============================================================================
