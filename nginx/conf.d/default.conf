# Reverse proxy: единая точка входа на :80. Всё (API, WebSocket, админки) — через пути, без отдельных портов.
#   /realms,/resources,/admin,/js -> Keycloak (+ админка /admin/)
#   /steve/                       -> SteVe (OCPP менеджер + OCPP WebSocket)
#   /ui/, /v1/                    -> Consul UI/API
#   /kafka/                       -> Kafka-UI
#   /                             -> api-gateway-service:8010 (REST всех сервисов + WebSocket /websocket/**)

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    # Встроенный DNS Docker. Резолвим имена контейнеров на КАЖДЫЙ запрос (valid=10s),
    # иначе nginx кэширует IP при старте и после рестарта контейнера (новый IP) ловит 502.
    # Поэтому upstream-имена заданы через переменные, а не статическими upstream-блоками.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Аплоады станций и т.п. могут быть крупными
    client_max_body_size 25m;

    # ---- Keycloak (OIDC + админка). Issuer = http://<host>/realms/charging-stations ----
    location ~ ^/(realms|resources|admin|js|robots\.txt) {
        set $up_keycloak keycloak:8080;
        proxy_pass http://$up_keycloak;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;
    }

    # ---- SteVe: админка /steve/manager + OCPP WebSocket /steve/websocket/... ----
    location /steve/ {
        set $up_steve app:8180;
        proxy_pass http://$up_steve;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # ---- Consul UI + API ----
    location /ui/ {
        set $up_consul consul-server:8500;
        proxy_pass http://$up_consul;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /v1/ {
        set $up_consul consul-server:8500;
        proxy_pass http://$up_consul;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Kafka-UI (контекст-путь /kafka задан через SERVER_SERVLET_CONTEXT_PATH) ----
    location /kafka/ {
        set $up_kafkaui kafka-ui:8080;
        proxy_pass http://$up_kafkaui;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Загруженные файлы станций (иконки коннекторов и т.п.) ----
    # Статику отдаёт напрямую station-controll-service (ResourceHandler
    # /uploads/**), минуя api-gateway. Мобильное приложение берёт
    # connectorTypeIcon как http://<host>/uploads/connector-icons/<file>.
    location /uploads/ {
        set $up_station_controll station-controll-service:8001;
        proxy_pass http://$up_station_controll;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Админ-панель BatEnergy (React SPA) — статика прямо из nginx на /console/ ----
    # Собранные файлы (chargingStationsAdmin/dist) бинд-маунтятся в контейнер как
    #   /usr/share/nginx/html/console. API/WS-запросы панели идут по КОРНЕВЫМ путям
    #   (/user, /contractor-admin, /station-controll, /payment, /booking, /websocket)
    #   и попадают в location / → api-gateway — здесь только быстрая раздача статики.
    location = /console { return 301 /console/; }   # без слэша → на канонический путь
    location /console/ {
        root /usr/share/nginx/html;            # файлы: /usr/share/nginx/html/console/**
        index index.html;
        try_files $uri $uri/ /console/index.html;   # SPA-fallback для клиентских маршрутов

        # Хэшированные ассеты Vite иммутабельны → кэшируем надолго (один заголовок).
        location ~* ^/console/assets/.+\.(?:js|css|woff2?|ttf|otf|svg|png|jpe?g|gif|webp|ico)$ {
            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off;
        }

        # index.html не кэшируем, чтобы новый деплой подхватывался сразу.
        location = /console/index.html {
            add_header Cache-Control "no-cache";
        }
    }

    # ---- Всё остальное: API + WebSocket через api-gateway ----
    location / {
        set $up_gateway api-gateway-service:8010;
        proxy_pass http://$up_gateway;
        proxy_http_version 1.1;

        # WebSocket upgrade (ws://<host>/websocket/ws/station-events?token=...)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Долгоживущие WS-соединения
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }
}

# ============================================================================
# HTTPS (включить, когда появится домен + сертификат).
# 1) В docker-compose.prod.yaml раскомментировать порт 443 и монтирование ./nginx/certs.
# 2) Положить fullchain.pem / privkey.pem в ./nginx/certs (или выпустить через certbot).
# 3) Скопировать server-блок выше, заменить `listen 80;` на `listen 443 ssl;` + ssl_certificate(_key),
#    и при желании добавить редирект с 80 на 443. Все location-блоки идентичны.
# ============================================================================
