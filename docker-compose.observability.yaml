# ============================================================================
# СТЕК НАБЛЮДАЕМОСТИ — запускается на ОТДЕЛЬНОМ obs-VM (не на прод-хосте!)
# ----------------------------------------------------------------------------
#   OTel Collector (gateway)  <- единая воронка OTLP от прод-хоста
#     traces  -> Tempo
#     metrics -> Prometheus (remote-write)
#     logs    -> Elasticsearch --(Kibana / Grafana)
#   Grafana = единая панель (метрики + трейсы + логи, корреляция по trace_id)
#   Kibana  = глубокий поиск логов
#
# Прод-хост открывает наружу только доступ к :4317/:4318 этого VM.
# UI (Grafana :3000, Kibana :5601) — держать за firewall/VPN, не публично.
#
# Запуск на obs-VM:
#   GF_ADMIN_PASSWORD=<секрет> docker compose -f docker-compose.observability.yaml up -d
# ============================================================================

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ------------------------------------------------------------------ Collector
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    container_name: otel-collector
    restart: unless-stopped
    logging: *default-logging
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./observability/otel-collector-gateway.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC  <- прод-agent (ограничить firewall'ом до IP прод-хоста)
      - "4318:4318"   # OTLP HTTP
    mem_limit: 512m
    networks: [observability-net]
    depends_on: [tempo, prometheus, elasticsearch]

  # ---------------------------------------------------------------------- Tempo
  tempo:
    image: grafana/tempo:2.5.0
    container_name: tempo
    restart: unless-stopped
    logging: *default-logging
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./observability/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo
    networks: [observability-net]

  # ----------------------------------------------------------------- Prometheus
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: prometheus
    restart: unless-stopped
    logging: *default-logging
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-remote-write-receiver   # приём метрик push'ем от Collector'а
      - --enable-feature=exemplar-storage     # exemplars metric->trace
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks: [observability-net]

  # -------------------------------------------------------------- Elasticsearch
  # Мажорная версия совпадает с audit-ES прода (8.13.4) — общий стиль/совместимость.
  # Это ОТДЕЛЬНЫЙ инстанс под логи, изолированный от audit-ES.
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: elasticsearch
    restart: unless-stopped
    logging: *default-logging
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms1g -Xmx1g"   # подстроить под размер VM
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks: [observability-net]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  # --------------------------------------------------------------------- Kibana
  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: kibana
    restart: unless-stopped
    logging: *default-logging
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"   # держать за firewall/VPN
    networks: [observability-net]
    depends_on:
      elasticsearch:
        condition: service_healthy

  # -------------------------------------------------------------------- Grafana
  grafana:
    image: grafana/grafana:11.1.0
    container_name: grafana
    restart: unless-stopped
    logging: *default-logging
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-admin}   # ЗАДАЙ через env!
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"   # держать за firewall/VPN
    networks: [observability-net]
    depends_on: [prometheus, tempo, elasticsearch]

volumes:
  tempo-data:
  prometheus-data:
  es-data:
  grafana-data:

networks:
  observability-net:
    driver: bridge
